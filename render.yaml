services:
  - type: web
    name: imperialpedia-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MOCK_AI
        value: "0"
